name: peat_flutter_example
description: "Demonstrates how to use the peat_flutter plugin."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  peat_flutter:
    path: ../

  cupertino_icons: ^1.0.8
  path_provider: ^2.1.0
  shared_preferences: ^2.3.0
  device_info_plus: ^10.1.0

  # Mobile BLE: uncomment when targeting Android/iOS with Dart-owned radio.
  # Requires BLE runtime permissions (declared in android/app/src/main/AndroidManifest.xml
  # and ios/Runner/Info.plist) and connection logic in main.dart.
  # flutter_blue_plus: ^1.32.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - PEAT.png
