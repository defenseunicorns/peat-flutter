name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Format & analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Gate on the published package sources (matches `just analyze`).
      - name: Analyze package
        run: dart analyze lib/

      # The example app carries pre-existing lints; report them but don't gate.
      - name: Analyze example (informational)
        continue-on-error: true
        run: |
          cd example
          flutter pub get
          flutter analyze

      # Formatting is reported but not enforced as a gate yet — the existing
      # tree predates a format pass. Run `dart format .` before enabling
      # --set-exit-if-changed here.
      - name: Check formatting (informational)
        continue-on-error: true
        run: dart format --output=none --set-exit-if-changed .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # The plugin's pure-Dart unit tests run on the host. Tests that exercise
      # the native peat-ffi library require the compiled artifact and are run in
      # platform-specific CI; see CONTRIBUTING.md.
      - name: Run tests
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No test/ directory yet — skipping. See CONTRIBUTING.md."
          fi

  # Platform-specific CI referenced by the `test` job above: the native
  # peat-ffi library is built and linked for aarch64 here, the arch
  # GitHub-hosted x64 runners cannot cover. Runs on the lab's self-hosted
  # Linux arm64 runner.
  native-linux-arm64:
    name: Native build (Linux arm64)
    runs-on: peat-arm64-linux-gb10-flutter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # This self-hosted aarch64 runner uses its pre-installed Flutter SDK —
      # Flutter publishes no Linux arm64 archive, so subosito/flutter-action is
      # intentionally not used here. cargo, the Android SDK, and the Linux
      # desktop toolchain (clang/ninja/gtk) are provisioned on the runner host.
      - name: Toolchain versions
        run: |
          flutter --version
          cargo --version
          clang --version | head -1

      - name: Install dependencies
        run: flutter pub get

      # Builds the example app for Linux desktop, which drives the plugin's
      # CMake → cargo build of libpeat_ffi from the published peat-ffi crate
      # (via rust/). This exercises the native FFI link path end to end.
      - name: Build example (Linux arm64, release)
        working-directory: example
        env:
          CARGO_NET_RETRY: "10" # runner egress is intermittent; retry crate fetches
        run: |
          flutter pub get
          flutter build linux --release

      # A successful build that dropped the UniFFI scaffolding symbols would
      # fail at app startup (dlsym), not at compile time — so assert the
      # exported symbols the hand-maintained Dart bindings load
      # (lib/src/generated/peat_ffi.dart) are present in the bundled library.
      - name: Verify libpeat_ffi symbols
        run: |
          so=$(find example/build/linux -name 'libpeat_ffi.so' | head -1)
          if [ -z "$so" ]; then
            echo "::error::libpeat_ffi.so not found in the Linux bundle"
            exit 1
          fi
          echo "Built: $so"
          rc=0
          for sym in \
            ffi_peat_ffi_uniffi_contract_version \
            uniffi_ffibuffer_peat_ffi_fn_func_create_node \
            uniffi_ffibuffer_peat_ffi_fn_method_peatnode_request_sync; do
            if nm -D "$so" | grep -q "$sym"; then
              echo "  OK: $sym"
            else
              echo "::error::missing exported symbol $sym"
              rc=1
            fi
          done
          exit $rc
