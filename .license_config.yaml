# Configuration for license-header validation (google/addlicense via uds-common
# `uds run lint:license`). See the Defense Unicorns Source Code Licensing &
# Copyright Policy.
license: apache
copyright: Defense Unicorns
# SPDX-style header only ("// SPDX-License-Identifier: Apache-2.0"), not the full
# license boilerplate per file.
spdx_only: true
ignore:
  # Generated / vendored sources — not authored here.
  - "lib/src/generated/**"
  - "lib/src/proto/**"
  # Flutter platform scaffolding generated by `flutter create`.
  - "android/**"
  - "ios/**"
  - "macos/**"
  - "linux/**"
  - "windows/**"
  - "example/android/**"
  - "example/ios/**"
  - "example/macos/**"
  - "example/linux/**"
  - "example/windows/**"
  # Build artifacts and tooling.
  - "**/build/**"
  - ".dart_tool/**"
